<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Partner Engage</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard-page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="#e05a2b"/>
        <path d="M18 6 L28 11 V19 C28 25 23 30 18 31 C13 30 8 25 8 19 V11 Z" fill="white" opacity="0.9"/>
        <path d="M14 18 L17 21 L22 15" stroke="#e05a2b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <span class="brand-name">InsuranceDekho</span>
        <span class="brand-sep">|</span>
        <span class="brand-product">Partner Engage</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">--</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">--</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <!-- TAB NAV -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tabPartners" onclick="switchTab('partners')">
      My Partners
    </button>
    <button class="tab-btn" id="tabTeam" onclick="switchTab('team')" style="display:none">
      Team Performance
    </button>
  </div>

  <main class="main-content">

    <!-- ===== PARTNERS TAB ===== -->
    <div id="panelPartners">
      <div class="section-label" id="zoneLabel">Loading...</div>

      <!-- Summary cards -->
      <div class="summary-cards" id="summaryCards">
        <div class="card-skel"></div><div class="card-skel"></div>
        <div class="card-skel"></div><div class="card-skel"></div>
        <div class="card-skel"></div><div class="card-skel"></div>
        <div class="card-skel"></div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search partner name / GID / city…" oninput="applyFilters()"/>
        <select id="statusFilter" onchange="applyFilters()">
          <option value="">All status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
        <select id="trendFilter" onchange="applyFilters()">
          <option value="">All trend</option>
          <option value="growth">Growth</option>
          <option value="degrowth">De-growth</option>
        </select>
        <select id="ownerRoleFilter" onchange="applyFilters()" style="display:none">
          <option value="">All owners</option>
        </select>
      </div>

      <!-- Partner table -->
      <div class="table-wrap">
        <table id="partnerTable">
          <thead>
            <tr>
              <th style="width:20%">Partner</th>
              <th style="width:10%">City/State</th>
              <th style="width:10%">Owner</th>
              <th style="width:10%">Potential</th>
              <th style="width:10%">Current Month</th>
              <th style="width:16%">Achievement %</th>
              <th style="width:8%">Trend</th>
              <th style="width:7%">Status</th>
              <th style="width:9%"></th>
            </tr>
          </thead>
          <tbody id="partnerBody">
            <tr><td colspan="9" class="loading-row">Loading partners...</td></tr>
          </tbody>
        </table>
        <div class="table-footer" id="tableFooter"></div>
      </div>
    </div>

    <!-- ===== TEAM TAB ===== -->
    <div id="panelTeam" style="display:none">
      <div class="section-label" id="teamLabel">Team Performance Overview</div>
      <div class="team-grid" id="teamGrid">
        <div class="card-skel" style="height:120px"></div>
        <div class="card-skel" style="height:120px"></div>
        <div class="card-skel" style="height:120px"></div>
      </div>
    </div>

  </main>

  <!-- PARTNER DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <div>
          <div class="modal-partner-name" id="mName">—</div>
          <div class="modal-partner-meta" id="mMeta">—</div>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>

      <!-- KPI cards -->
      <div class="modal-kpi-grid" id="mKpis"></div>

      <!-- Potential box -->
      <div class="potential-box" id="mPotentialBox"></div>

      <!-- Trend chart -->
      <div class="modal-section-title">14-Month Performance Trend</div>
      <div class="chart-wrap">
        <canvas id="trendChart"></canvas>
      </div>

      <!-- History table -->
      <div class="modal-section-title" style="margin-top:16px">Month-by-Month History</div>
      <div class="table-wrap" style="margin-bottom:16px">
        <table class="mini-table">
          <thead>
            <tr><th>Month</th><th>Premium (₹)</th><th>MoM Change</th></tr>
          </thead>
          <tbody id="mHistoryBody"></tbody>
        </table>
      </div>

      <!-- Engagement -->
      <div class="modal-section-title">Engagement — Current Month</div>
      <div class="modal-engage-grid" id="mEngageGrid"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
