<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Partner Engage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="#e05a2b"/>
        <path d="M18 6 L28 11 V19 C28 25 23 30 18 31 C13 30 8 25 8 19 V11 Z" fill="white" opacity="0.9"/>
        <path d="M14 18 L17 21 L22 15" stroke="#e05a2b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <span class="brand-name">InsuranceDekho</span>
        <span class="brand-sep">|</span>
        <span class="brand-product">Partner Engage</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">--</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">--</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- SUMMARY CARDS -->
    <div class="section-label" id="zoneLabel">Loading zone data...</div>
    <div class="summary-cards" id="summaryCards">
      <div class="card-skel"></div><div class="card-skel"></div>
      <div class="card-skel"></div><div class="card-skel"></div>
      <div class="card-skel"></div><div class="card-skel"></div>
      <div class="card-skel"></div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search partner name / GID / city…" oninput="applyFilters()" />
      <select id="statusFilter" onchange="applyFilters()">
        <option value="">All status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      <select id="trendFilter" onchange="applyFilters()">
        <option value="">All trend</option>
        <option value="growth">Growth</option>
        <option value="degrowth">De-growth</option>
      </select>
    </div>

    <!-- PARTNER TABLE -->
    <div class="table-wrap">
      <table id="partnerTable">
        <thead>
          <tr>
            <th style="width:22%">Partner</th>
            <th style="width:11%">City / State</th>
            <th style="width:12%">Owner</th>
            <th style="width:11%">Potential</th>
            <th style="width:11%">Current Month</th>
            <th style="width:18%">Achievement %</th>
            <th style="width:8%">Trend</th>
            <th style="width:7%">Status</th>
            <th style="width:5%"></th>
          </tr>
        </thead>
        <tbody id="partnerBody">
          <tr><td colspan="9" class="loading-row">Loading partners...</td></tr>
        </tbody>
      </table>
      <div class="table-footer" id="tableFooter"></div>
    </div>
  </main>

  <!-- PARTNER DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <div>
          <div class="modal-partner-name" id="mName">—</div>
          <div class="modal-partner-meta" id="mMeta">—</div>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>

      <div class="modal-kpi-grid" id="mKpis"></div>

      <div class="modal-section-title">14-Month Performance History</div>
      <div class="table-wrap" style="margin-bottom:16px">
        <table class="mini-table">
          <thead>
            <tr><th>Month</th><th>Premium (₹)</th><th>MoM Change</th></tr>
          </thead>
          <tbody id="mHistoryBody"></tbody>
        </table>
      </div>

      <div class="modal-section-title">Engagement — Current Month</div>
      <div class="modal-engage-grid" id="mEngageGrid"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
