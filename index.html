<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Partner Engage Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <h1>Partner Engage Portal</h1>
    <div class="sub">InsuranceDekho · Sign in to continue</div>

    <!-- Step 1: GID -->
    <div id="step-gid">
      <label>User ID (GID)</label>
      <input type="text" id="gidInput" placeholder="e.g. IDK-ANILKUMAR" autocomplete="username" />
      <button class="btn-primary" id="btnContinue">Continue</button>
      <div class="login-msg" id="gidMsg"></div>
    </div>

    <!-- Step 2: Password -->
    <div id="step-password" class="hidden">
      <label>Password</label>
      <input type="password" id="passwordInput" autocomplete="current-password" />
      <button class="btn-primary" id="btnLogin">Sign in</button>
      <div class="login-msg" id="loginMsg"></div>
      <button class="btn-link" id="btnForgot" style="margin-top:8px;">Forgot password?</button>
    </div>

    <!-- Step 3: Set password (first time) -->
    <div id="step-setpw" class="hidden">
      <label>Create a password</label>
      <input type="password" id="newPwInput" />
      <label>Confirm password</label>
      <input type="password" id="newPw2Input" />
      <button class="btn-primary" id="btnSetPw">Set password &amp; sign in</button>
      <div class="login-msg" id="setMsg"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    async function sha256(text) {
      const buf = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    const $ = (id) => document.getElementById(id);
    let currentGid = '';

    function showStep(name) {
      ['gid','password','setpw'].forEach(s => $('step-' + s).classList.toggle('hidden', s !== name));
    }
    function setMsg(elId, text, kind) {
      const el = $(elId);
      el.textContent = text || '';
      el.className = 'login-msg ' + (kind || '');
    }

    $('btnContinue').addEventListener('click', async () => {
      const gid = $('gidInput').value.trim();
      if (!gid) { setMsg('gidMsg', 'Enter your User ID.', 'error'); return; }
      setMsg('gidMsg', 'Checking…');
      try {
        const r = await fetch(API_URL + '?action=checkPassword&gid=' + encodeURIComponent(gid)).then(r => r.json());
        if (!r.success) { setMsg('gidMsg', r.message || 'Unknown', 'error'); return; }
        currentGid = gid;
        setMsg('gidMsg', '');
        showStep(r.hasPassword ? 'password' : 'setpw');
      } catch (e) { setMsg('gidMsg', 'Connection error: ' + e.message, 'error'); }
    });

    $('btnLogin').addEventListener('click', async () => {
      const pw = $('passwordInput').value;
      if (!pw) { setMsg('loginMsg', 'Enter password.', 'error'); return; }
      setMsg('loginMsg', 'Signing in…');
      const hash = await sha256(pw);
      try {
        const r = await fetch(API_URL + '?action=login&gid=' + encodeURIComponent(currentGid) + '&password=' + hash).then(r => r.json());
        if (!r.success) { setMsg('loginMsg', r.message || 'Failed', 'error'); return; }
        sessionStorage.setItem('peUser', JSON.stringify(r.user));
        // route MASTER to master.html
        if (r.user.role === 'MASTER') location.href = 'master.html';
        else location.href = 'dashboard.html';
      } catch (e) { setMsg('loginMsg', 'Connection error: ' + e.message, 'error'); }
    });

    $('btnSetPw').addEventListener('click', async () => {
      const p1 = $('newPwInput').value, p2 = $('newPw2Input').value;
      if (!p1 || p1.length < 6) { setMsg('setMsg', 'Password must be at least 6 characters.', 'error'); return; }
      if (p1 !== p2) { setMsg('setMsg', 'Passwords don\'t match.', 'error'); return; }
      setMsg('setMsg', 'Setting password…');
      const hash = await sha256(p1);
      try {
        const r = await fetch(API_URL + '?action=setPassword&gid=' + encodeURIComponent(currentGid) + '&newPassword=' + hash).then(r => r.json());
        if (!r.success) { setMsg('setMsg', r.message || 'Failed', 'error'); return; }
        // auto-login
        const r2 = await fetch(API_URL + '?action=login&gid=' + encodeURIComponent(currentGid) + '&password=' + hash).then(r => r.json());
        if (!r2.success) { setMsg('setMsg', r2.message || 'Failed', 'error'); return; }
        sessionStorage.setItem('peUser', JSON.stringify(r2.user));
        if (r2.user.role === 'MASTER') location.href = 'master.html';
        else location.href = 'dashboard.html';
      } catch (e) { setMsg('setMsg', 'Connection error: ' + e.message, 'error'); }
    });

    $('btnForgot').addEventListener('click', () => {
      // Clear current hash so user can set a new one — admin must blank col E first
      alert('Ask admin to clear the Password column (Col E) for your GID in the Users sheet. Then return here and use Continue → Create password.');
    });
  </script>
</body>
</html>
