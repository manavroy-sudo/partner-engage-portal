<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Engage Portal — Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%); }
    .login-box { background:#fff; border-radius:16px; padding:40px 36px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .login-logo { font-size:22px; font-weight:800; color:#3b82f6; margin-bottom:4px; }
    .login-sub  { font-size:13px; color:#64748b; margin-bottom:28px; }
    .form-group { margin-bottom:16px; }
    .form-label { font-size:12px; font-weight:600; color:#374151; display:block; margin-bottom:5px; }
    .form-input {
      width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:8px;
      font-size:14px; transition:border .2s; background:#f8fafc;
    }
    .form-input:focus { outline:none; border-color:#3b82f6; background:#fff; }
    .login-btn {
      width:100%; padding:12px; background:#3b82f6; color:#fff; border:none;
      border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px;
      transition:background .2s;
    }
    .login-btn:hover    { background:#2563eb; }
    .login-btn:disabled { background:#93c5fd; cursor:not-allowed; }
    .login-error { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:10px 14px; color:#dc2626; font-size:13px; margin-bottom:12px; display:none; }
    .set-pw-box  { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:14px; margin-top:12px; display:none; }
    .set-pw-box h4 { color:#1d4ed8; font-size:13px; margin-bottom:10px; }
    #passwordSection { display:none; }
    .check-btn {
      width:100%; padding:10px; background:#475569; color:#fff; border:none;
      border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:4px;
    }
    .check-btn:hover { background:#334155; }
  </style>
</head>
<body id="loginPage">
  <div class="login-box">
    <div class="login-logo">Partner Engage</div>
    <div class="login-sub">InsuranceDekho · AM &amp; Above Portal</div>

    <div id="loginError" class="login-error"></div>

    <div class="form-group">
      <label class="form-label">User ID (GID / Employee ID)</label>
      <input id="gidInput" class="form-input" type="text" placeholder="Enter your User ID" autocomplete="off">
    </div>
    <button class="check-btn" onclick="checkGidAndProceed()">Continue →</button>

    <div id="passwordSection">
      <div class="form-group" style="margin-top:14px;">
        <label class="form-label">Password</label>
        <input id="passwordInput" class="form-input" type="password" placeholder="Enter your password">
      </div>
      <button id="loginBtn" class="login-btn">
        <span id="loginSpinner" style="display:none;">⏳ </span>Sign In
      </button>
    </div>

    <div id="setPasswordSection" class="set-pw-box">
      <h4>🔑 Set Your Password (First Time)</h4>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input id="newPassword" class="form-input" type="password" placeholder="Create a strong password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input id="confirmPassword" class="form-input" type="password" placeholder="Repeat password">
      </div>
      <button id="savePasswordBtn" class="login-btn">Set Password &amp; Login</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
