<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Partner Engage — InsuranceDekho</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="#e05a2b"/>
        <path d="M18 6 L28 11 V19 C28 25 23 30 18 31 C13 30 8 25 8 19 V11 Z" fill="white" opacity="0.9"/>
        <path d="M14 18 L17 21 L22 15" stroke="#e05a2b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <div class="login-brand">InsuranceDekho</div>
        <div class="login-sub">Partner Engage Portal</div>
      </div>
    </div>

    <!-- STEP 1: Enter GID -->
    <div id="stepGid">
      <h1 class="login-title">Sign in to your account</h1>
      <div class="form-group">
        <label for="gidInput">Your User ID (GID)</label>
        <input type="text" id="gidInput" placeholder="e.g. IDK-ANILKUMAR" autocomplete="username"/>
      </div>
      <div id="gidError" class="error-msg" style="display:none"></div>
      <button class="btn-primary" onclick="checkGid()">
        <span id="gidBtnText">Continue</span>
        <span id="gidSpinner" class="spinner" style="display:none"></span>
      </button>
    </div>

    <!-- STEP 2A: Enter existing password -->
    <div id="stepPassword" style="display:none">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <h1 class="login-title">Enter your password</h1>
      <p class="step-user-label" id="passwordUserLabel"></p>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
      <div id="passwordError" class="error-msg" style="display:none"></div>
      <button class="btn-primary" onclick="doLogin()">
        <span id="loginBtnText">Sign In</span>
        <span id="loginSpinner" class="spinner" style="display:none"></span>
      </button>
      <button class="btn-link" onclick="showForgotFlow()">Forgot password?</button>
    </div>

    <!-- STEP 2B: First time — set new password -->
    <div id="stepSetPassword" style="display:none">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <h1 class="login-title">Create your password</h1>
      <p class="step-user-label" id="setPasswordUserLabel"></p>
      <div class="info-box">This is your first login. Please create a password to secure your account.</div>
      <div class="form-group">
        <label for="newPassword1">New Password</label>
        <input type="password" id="newPassword1" placeholder="At least 6 characters"/>
      </div>
      <div class="form-group">
        <label for="newPassword2">Confirm Password</label>
        <input type="password" id="newPassword2" placeholder="Repeat your password"/>
      </div>
      <div id="setPasswordError" class="error-msg" style="display:none"></div>
      <div id="setPasswordSuccess" class="success-msg" style="display:none"></div>
      <button class="btn-primary" onclick="doSetPassword(false)">
        <span id="setPasswordBtnText">Set Password & Sign In</span>
        <span id="setPasswordSpinner" class="spinner" style="display:none"></span>
      </button>
    </div>

    <!-- STEP 2C: Forgot / Change password -->
    <div id="stepChangePassword" style="display:none">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <h1 class="login-title">Reset your password</h1>
      <p class="step-user-label" id="changePasswordUserLabel"></p>
      <div class="form-group">
        <label for="oldPassword">Current Password</label>
        <input type="password" id="oldPassword" placeholder="Your current password"/>
      </div>
      <div class="form-group">
        <label for="changePassword1">New Password</label>
        <input type="password" id="changePassword1" placeholder="At least 6 characters"/>
      </div>
      <div class="form-group">
        <label for="changePassword2">Confirm New Password</label>
        <input type="password" id="changePassword2" placeholder="Repeat new password"/>
      </div>
      <div id="changePasswordError" class="error-msg" style="display:none"></div>
      <div id="changePasswordSuccess" class="success-msg" style="display:none"></div>
      <button class="btn-primary" onclick="doSetPassword(true)">
        <span id="changeBtnText">Update Password</span>
        <span id="changeSpinner" class="spinner" style="display:none"></span>
      </button>
    </div>

    <p class="login-footer">Access is restricted to authorised personnel only.<br/>Contact your ZH if you need help.</p>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
