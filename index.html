<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AM and Above Focused Partners — InsuranceDekho</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 45%,#0f172a 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;overflow:hidden;}

    /* animated bg orbs */
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.18;animation:float 8s ease-in-out infinite;}
    .orb1{width:500px;height:500px;background:#ef4444;top:-120px;left:-120px;animation-delay:0s;}
    .orb2{width:400px;height:400px;background:#f97316;bottom:-100px;right:-100px;animation-delay:3s;}
    .orb3{width:300px;height:300px;background:#3b82f6;top:50%;left:60%;animation-delay:5s;}
    @keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}

    .login-wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:24px;}

    /* brand */
    .brand-header{text-align:center;margin-bottom:28px;}
    .brand-logo{width:64px;height:64px;background:linear-gradient(135deg,#ef4444,#f97316);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:14px;box-shadow:0 8px 32px rgba(239,68,68,.4);}
    .brand-title{font-size:20px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px;}
    .brand-sub{font-size:13px;color:rgba(255,255,255,.55);}

    /* glass card */
    .glass{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:32px 36px;box-shadow:0 24px 64px rgba(0,0,0,.4);}

    .card-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;}
    .card-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px;}

    /* form */
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px;}
    .field input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 16px;font-size:14px;color:#fff;outline:none;transition:.2s;}
    .field input::placeholder{color:rgba(255,255,255,.35);}
    .field input:focus{border-color:rgba(239,68,68,.7);background:rgba(255,255,255,.12);box-shadow:0 0 0 3px rgba(239,68,68,.15);}
    .field input[type=password]{letter-spacing:.1em;}

    /* password toggle */
    .pw-wrap{position:relative;}
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:16px;padding:4px;}
    .pw-toggle:hover{color:rgba(255,255,255,.8);}

    /* submit */
    .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#f97316);border:none;border-radius:10px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:.2s;box-shadow:0 4px 20px rgba(239,68,68,.4);margin-top:4px;}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(239,68,68,.5);}
    .btn-login:active{transform:translateY(0);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    /* set password form (hidden by default) */
    .set-pw-section{display:none;margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);}
    .set-pw-section.show{display:block;}
    .set-pw-section .hint{font-size:12px;color:#fbbf24;margin-bottom:14px;padding:10px 14px;background:rgba(251,191,36,.1);border-radius:8px;border:1px solid rgba(251,191,36,.2);}

    /* alert */
    .alert{display:none;padding:11px 14px;border-radius:9px;font-size:13px;font-weight:500;margin-bottom:16px;}
    .alert.error{display:block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
    .alert.success{display:block;background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.3);color:#86efac;}

    /* divider */
    .divider{display:flex;align-items:center;gap:10px;margin:20px 0;}
    .divider hr{flex:1;border:none;border-top:1px solid rgba(255,255,255,.1);}
    .divider span{font-size:11px;color:rgba(255,255,255,.35);}

    /* footer */
    .login-footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,.3);}
    .login-footer b{color:rgba(255,255,255,.5);}

    /* loader spinner */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="login-wrap">
    <div class="brand-header">
      <div class="brand-logo">ID</div>
      <div class="brand-title">AM and Above Focused Partners</div>
      <div class="brand-sub">InsuranceDekho Performance Portal</div>
    </div>

    <div class="glass">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in with your employee ID to continue</div>

      <div class="alert" id="alertBox"></div>

      <div class="field">
        <label>Employee / User ID</label>
        <input type="text" id="gidInput" placeholder="Enter your User ID" autocomplete="username" />
      </div>

      <div class="field set-pw-section" id="pwSection">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password" />
          <button class="pw-toggle" type="button" onclick="togglePw('pwInput',this)">👁</button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="handleLoginClick()">Continue</button>

      <!-- Set new password (shown when no password exists) -->
      <div class="set-pw-section" id="newPwSection">
        <div class="hint">🔐 First login — please set your password</div>
        <div class="field">
          <label>New Password</label>
          <div class="pw-wrap">
            <input type="password" id="newPwInput" placeholder="Create a strong password" />
            <button class="pw-toggle" type="button" onclick="togglePw('newPwInput',this)">👁</button>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="confirmPwInput" placeholder="Repeat your password" />
            <button class="pw-toggle" type="button" onclick="togglePw('confirmPwInput',this)">👁</button>
          </div>
        </div>
        <button class="btn-login" onclick="handleSetPassword()">Set Password &amp; Login</button>
      </div>
    </div>

    <div class="login-footer">
      Secured by <b>InsuranceDekho</b> · Partner Performance System
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    var step = 'gid'; // 'gid' | 'password' | 'setpw'

    function togglePw(id, btn) {
      var inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type='text'; btn.textContent='🙈'; }
      else { inp.type='password'; btn.textContent='👁'; }
    }
    function showAlert(msg, type) {
      var el = document.getElementById('alertBox');
      el.textContent = msg; el.className = 'alert '+(type||'error');
    }
    function hideAlert() { document.getElementById('alertBox').className='alert'; }
    function setLoading(on) {
      var btn = document.getElementById('btnLogin');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Please wait…' : (step==='gid' ? 'Continue' : 'Sign In');
    }
    async function sha256(str) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }

    // Enter key support
    document.addEventListener('keydown', function(e) {
      if (e.key==='Enter') {
        if (step==='gid'||step==='password') handleLoginClick();
      }
    });

    async function handleLoginClick() {
      var gid = document.getElementById('gidInput').value.trim();
      if (!gid) { showAlert('Please enter your User ID.'); return; }
      hideAlert();

      if (step === 'gid') {
        setLoading(true);
        try {
          var res = await fetch(API_URL+'?action=checkPassword&gid='+encodeURIComponent(gid)).then(r=>r.json());
          if (!res.success) { showAlert(res.message||'User not found.'); setLoading(false); return; }
          if (res.hasPassword) {
            // Show password field
            document.getElementById('pwSection').style.display='block';
            document.getElementById('btnLogin').textContent='Sign In';
            step='password';
            document.getElementById('pwInput').focus();
          } else {
            // Show set-password form
            document.getElementById('newPwSection').classList.add('show');
            document.getElementById('btnLogin').style.display='none';
            step='setpw';
          }
        } catch(err){ showAlert('Connection error. Check your internet.'); }
        setLoading(false);

      } else if (step === 'password') {
        var pw = document.getElementById('pwInput').value;
        if (!pw) { showAlert('Please enter your password.'); return; }
        setLoading(true);
        try {
          var hash = await sha256(pw);
          var res  = await fetch(API_URL+'?action=login&gid='+encodeURIComponent(gid)+'&password='+encodeURIComponent(hash)).then(r=>r.json());
          if (!res.success) { showAlert(res.message||'Incorrect credentials.'); }
          else {
            sessionStorage.setItem('peUser', JSON.stringify(res.user));
            document.getElementById('btnLogin').innerHTML='<span class="spinner"></span>Loading dashboard…';
            if (res.user.role==='MASTER') location.href='master.html';
            else location.href='dashboard.html';
          }
        } catch(err){ showAlert('Connection error.'); }
        setLoading(false);
      }
    }

    async function handleSetPassword() {
      var gid  = document.getElementById('gidInput').value.trim();
      var npw  = document.getElementById('newPwInput').value;
      var cpw  = document.getElementById('confirmPwInput').value;
      if (!npw || npw.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
      if (npw !== cpw) { showAlert('Passwords do not match.'); return; }
      hideAlert();
      try {
        var hash = await sha256(npw);
        var res  = await fetch(API_URL+'?action=setPassword&gid='+encodeURIComponent(gid)+'&oldPassword=&newPassword='+encodeURIComponent(hash)).then(r=>r.json());
        if (!res.success) { showAlert(res.message||'Failed to set password.'); return; }
        // Auto-login
        var loginRes = await fetch(API_URL+'?action=login&gid='+encodeURIComponent(gid)+'&password='+encodeURIComponent(hash)).then(r=>r.json());
        if (loginRes.success) {
          sessionStorage.setItem('peUser', JSON.stringify(loginRes.user));
          location.href = loginRes.user.role==='MASTER' ? 'master.html' : 'dashboard.html';
        } else showAlert(loginRes.message||'Login failed after setting password.');
      } catch(err){ showAlert('Connection error.'); }
    }
  </script>
</body>
</html>
