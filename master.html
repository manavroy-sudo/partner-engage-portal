<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Dashboard — Partner Engage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="master-body">

  <div id="masterLoader" class="loader-overlay" style="display:none;">
    <div class="spinner"></div><p>Loading national data…</p>
  </div>

  <!-- Header -->
  <header class="master-header">
    <div id="masterHeader" class="master-header-text">Partner Engage Portal — National Command Centre</div>
    <div class="master-header-right">
      <button onclick="window.location.href='dashboard.html'" class="btn-outline">← My Dashboard</button>
      <button id="logoutBtn" class="btn-outline">Logout</button>
    </div>
  </header>

  <!-- Master KPI Strip -->
  <div id="masterKpiStrip" class="kpi-strip master-kpi-strip"></div>

  <!-- Tabs -->
  <div class="master-tabs">
    <button class="master-tab-btn" data-tab="tabPanIndia">🇮🇳 Pan-India</button>
    <button class="master-tab-btn" data-tab="tabZone">🗺️ Zone Performance</button>
    <button class="master-tab-btn" data-tab="tabRole">👤 Role Performance</button>
    <button class="master-tab-btn" data-tab="tabState">📍 State Performance</button>
    <button class="master-tab-btn" data-tab="tabConnect">📞 Call &amp; Visit Tracker</button>
    <button class="master-tab-btn" data-tab="tabLogin">🔐 Login Activity</button>
  </div>

  <!-- Tab Contents -->
  <div class="master-tab-content" id="tabPanIndia" style="display:none;"></div>
  <div class="master-tab-content" id="tabZone"     style="display:none;"></div>
  <div class="master-tab-content" id="tabRole"     style="display:none;"></div>
  <div class="master-tab-content" id="tabState"    style="display:none;"></div>
  <div class="master-tab-content" id="tabConnect"  style="display:none;"></div>
  <div class="master-tab-content" id="tabLogin"    style="display:none;"></div>

  <!-- Zone Team Breakdown Modal -->
  <div id="zoneModal" class="modal-overlay" style="display:none;">
    <div class="modal-box modal-wide">
      <div class="modal-header">
        <h2 id="zoneModalTitle">Team Breakdown</h2>
        <button id="zoneModalClose" class="modal-close-btn">✕</button>
      </div>
      <div id="zoneModalBody" class="zone-modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="config.js"></script>
  <script src="master.js"></script>
</body>
</html>
